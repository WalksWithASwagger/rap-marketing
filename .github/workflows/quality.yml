name: Quality (report-only)

# Report-only gate: surfaces Lighthouse + axe scores on push to main and PRs.
# Never configured as a required check — it informs, it does not block merges.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lighthouse (lhci autorun)
        run: npx lhci autorun

      - name: Accessibility (axe)
        continue-on-error: true
        run: |
          npm start &
          npx wait-on http://localhost:3000
          node scripts/run-axe.mjs
